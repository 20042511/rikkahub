name: Build with Termux

on:
  push:
    branches: [termux-native]
  workflow_dispatch:

env:
  TERMUX_VERSION: v0.118.0

jobs:
  prepare-bootstrap:
    strategy:
      matrix:
        # 首版只打包 arm64（覆盖 95%+ 用户）
        arch: [arm64-v8a]
        include:
          - arch: arm64-v8a
            termux-arch: arm64-v8a
            file-arch: aarch64
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download Termux APK
        run: |
          # 先拼接 URL
          DL_URL="https://github.com/termux/termux-app/releases/download/${TERMUX_VERSION}/termux-app_${TERMUX_VERSION}+github-debug_${{ matrix.termux-arch }}.apk"
          # 打印出来确认正确
          echo "DEBUG: 下载地址 -> $DL_URL"
          # 确认没问题了再下载
          curl -fL -o termux.apk "$DL_URL"
          ls -lh termux.apk

      - name: Extract bootstrap
        run: |
          # 从 APK 中提取 bootstrap
          unzip -p termux.apk "lib/${{ matrix.arch }}/libtermux-bootstrap.so" > bootstrap.so
          # 找到 ZIP 偏移并提取
          python3 -c "
          data = open('bootstrap.so', 'rb').read()
          idx = data.find(b'PK\x03\x04')
          print(f'ZIP at offset: {idx} (0x{idx:x})')
          open('bootstrap.zip', 'wb').write(data[idx:])
          "
          # 解压
          mkdir -p termux-rootfs
          unzip -o bootstrap.zip -d termux-rootfs/ 2>&1 | tail -2
          echo "Files extracted: $(find termux-rootfs -type f | wc -l)"

      - name: Package as asset
        run: |
          mkdir -p app/src/main/assets/termux
          cd termux-rootfs
          tar -cJf "../app/src/main/assets/termux/bootstrap-${{ matrix.file-arch }}.tar.xz" .
          echo "Asset size: $(ls -lh ../app/src/main/assets/termux/bootstrap-${{ matrix.file-arch }}.tar.xz | awk '{print $5}')"

      - uses: actions/upload-artifact@v4
        with:
          name: bootstrap-${{ matrix.file-arch }}
          path: app/src/main/assets/termux/bootstrap-${{ matrix.file-arch }}.tar.xz
          retention-days: 7

  build:
    needs: prepare-bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Download bootstrap asset
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-aarch64
          path: app/src/main/assets/termux/

      - name: Verify assets
        run: |
          ls -lh app/src/main/assets/termux/
          file app/src/main/assets/termux/*.tar.xz

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare google-services.json
        run: |
          cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "rikkahub-termux-dummy",
              "storage_bucket": "rikkahub-termux-dummy.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub"
                  }
                },
                "api_key": [
                  {
                    "current_key": "AIzaSyDummyKeyForBuildOnly"
                  }
                ]
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Build APK
        run: |
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -20

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rikkahub-termux-arm64
          path: app/build/outputs/apk/debug/*.apk

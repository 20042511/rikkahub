name: Build with Termux

on:
  push:
    branches: [termux-native]
  workflow_dispatch:

jobs:
  prepare-bootstrap:
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a, x86_64, x86]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Termux APK (${{ matrix.arch }})
        run: |
          MAP='{"arm64-v8a":"arm64-v8a","armeabi-v7a":"arm","x86_64":"x86_64","x86":"x86"}'
          A=$(echo "$MAP" | jq -r '.["${{ matrix.arch }}"]')
          curl -fL -o termux.apk \
            "https://github.com/termux/termux-app/releases/download/v0.118.0/termux-app_v0.118.0+github-debug_${A}.apk"

      - name: Extract bootstrap
        run: |
          unzip -p termux.apk "lib/${{ matrix.arch }}/libtermux-bootstrap.so" > bootstrap.so
          python3 -c "
          d = open('bootstrap.so', 'rb').read()
          i = d.find(b'PK\\x03\\x04')
          with open('bootstrap.zip', 'wb') as f: f.write(d[i:])
          "
          mkdir -p termux-rootfs
          unzip -o bootstrap.zip -d termux-rootfs/ | tail -1

      - name: Package as asset
        run: |
          mkdir -p app/src/main/assets/termux
          cd termux-rootfs
          tar -cJf "../app/src/main/assets/termux/bootstrap-${{ matrix.arch }}.tar.xz" .
          echo "Size: $(ls -lh ../app/src/main/assets/termux/bootstrap-${{ matrix.arch }}.tar.xz)"

      - uses: actions/upload-artifact@v4
        with:
          name: bootstrap-${{ matrix.arch }}
          path: app/src/main/assets/termux/bootstrap-${{ matrix.arch }}.tar.xz

  build:
    needs: prepare-bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: bootstrap-*
          path: app/src/main/assets/termux/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build
        run: |
          echo '{}' > app/google-services.json
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: app/build/outputs/apk/debug/*.apk

name: Escape Build (HostShellRunner)

on:
  push:
    branches: [ "escape" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

concurrency:
  group: escape-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run workspace unit tests
        run: |
          chmod +x gradlew
          ./gradlew :workspace:testDebugUnitTest --stacktrace

      - name: Run app unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace
        continue-on-error: true  # app 层测试依赖 Android 环境，允许跳过

  build:
    name: Build (${{ matrix.abi }})
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, x86_64]
      fail-fast: false  # 一个 ABI 失败不影响另一个

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # --- Web UI 构建 ---
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-ui/pnpm-lock.yaml

      - name: Install web-ui dependencies
        working-directory: web-ui
        run: pnpm install --frozen-lockfile

      # --- Gradle 加速 ---
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate debug keystore
        run: |
          if [ ! -f ~/debug.keystore ]; then
            keytool -genkey -v -keystore ~/debug.keystore \
              -alias androiddebugkey -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Configure debug signing
        run: |
          cat > local.properties << PROPEOF
          key.store=$(echo ~)/debug.keystore
          key.alias=androiddebugkey
          key.store.password=android
          key.key.password=android
          PROPEOF

      - name: Build Debug APK (${{ matrix.abi }})
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            --build-cache \
            --configuration-cache \
            -Pandroid.injected.invoked.from.ide=false

      - name: Upload APK (${{ matrix.abi }})
        uses: actions/upload-artifact@v4
        with:
          name: rikkahub-escape-debug-${{ matrix.abi }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

  # 聚合：把两个 ABI 的 APK 打包成一个 release
  aggregate:
    name: Aggregate Artifacts
    needs: build
    runs-on: ubuntu-latest
    if: always() && github.event_name != 'pull_request'
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: rikkahub-escape-debug-*
          merge-multiple: true

      - name: List artifacts
        run: ls -lh

      - uses: actions/upload-artifact@v4
        with:
          name: rikkahub-escape-debug-all
          path: ./*
          retention-days: 90

  # 发布到 Releases 页（对所有人可见，无需登录即可下载）
  release:
    name: Publish Release
    needs: [build, aggregate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: success() && github.event_name != 'pull_request'
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: rikkahub-escape-debug-*
          merge-multiple: true
          path: artifacts

      - name: Rename APKs
        run: |
          mkdir -p release-apks
          find artifacts -name '*.apk' | while read f; do
            basename=$(basename "$f")
            # 从路径和文件名中提取 ABI 标识
            case "$basename" in
              *arm64*v8a*|*aarch64*)   abi="arm64-v8a" ;;
              *x86_64*|*amd64*)         abi="x86_64"    ;;
              *)                        abi="universal" ;;
            esac
            cp "$f" "release-apks/rikkahub-escape-$abi-debug.apk"
            echo "  → rikkahub-escape-$abi-debug.apk ($(du -h "$f" | cut -f1))"
          done
          ls -lh release-apks/

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: escape-${{ github.run_id }}
          name: "Escape Build #${{ github.run_number }} (${{ github.sha }})"
          body: |
            ## RikkaHub Escape APK

            | 字段 | 值 |
            |:--|:--|
            | Commit | `${{ github.sha }}` |
            | Branch | `escape` |
            | 构建时间 | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |
            | Runner | HostShellRunner（绕过 proot phantom process killer） |

            ### 下载
            - [arm64-v8a APK](artifacts/rikkahub-escape-arm64-v8a-debug.apk) — 主流 Android 设备
            - [x86_64 APK](artifacts/rikkahub-escape-x86_64-debug.apk) — 模拟器

            > ⚠️ Debug 版本，安装前需开启「允许安装未知来源应用」。
          files: release-apks/rikkahub-escape-*-debug.apk
          make_latest: true
